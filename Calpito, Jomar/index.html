<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Card</title>
  <style>
    :root {
      --primary: #3f5fbf;
      --primary-dark: #27479f;
      --primary-soft: #eaf0ff;
      --bg: #eef2f7;
      --text: #0f172a;
      --muted: #5b6473;
      --card: #ffffff;
      --soft: #f3f5f8;
      --shadow: 0 16px 40px rgba(35, 58, 125, 0.14);
      --radius: 24px;
      --border: rgba(63, 95, 191, 0.12);
      --banner-fallback: linear-gradient(160deg, #4f71d4 0%, #3f5fbf 55%, #27479f 100%);
      --image-fallback: #dbe2f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, #f8fbff 0%, #eef2f7 45%, #e9eef5 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 14px 28px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .hero {
      position: relative;
      background: var(--card);
    }

    .banner {
      position: relative;
      height: 180px;
      overflow: hidden;
      background: var(--banner-fallback);
    }

    .banner-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      background: var(--image-fallback);
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0) 45%),
        linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.04));
      pointer-events: none;
      z-index: 1;
    }

    .logo-wrap {
      position: absolute;
      top: 12px;
      left: 14px;
      z-index: 3;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 12px;
      padding: 6px 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      max-width: 120px;
    }

    .logo {
      height: 38px;
      width: auto;
      max-width: 100%;
      display: block;
      object-fit: contain;
    }

    .profile-wrap {
      position: relative;
      padding: 0 22px 18px;
    }

    .avatar-shell {
      width: 122px;
      height: 122px;
      margin-top: -62px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid #fff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
      background: var(--image-fallback);
    }

    .identity {
      margin-top: 16px;
    }

    .name {
      margin: 0;
      font-size: clamp(26px, 5vw, 32px);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #0f172a;
    }

    .title {
      margin: 8px 0 0;
      font-size: clamp(16px, 3.6vw, 19px);
      line-height: 1.35;
      font-weight: 700;
      color: #24344f;
    }

    .org {
      margin: 6px 0 0;
      font-size: clamp(14px, 3.2vw, 17px);
      line-height: 1.45;
      color: #5f6d84;
      font-style: italic;
    }

    .content {
      padding: 0 22px 22px;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .contact-item {
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      padding: 12px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(15, 23, 42, 0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .contact-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
      background: #fcfdff;
    }

    .icon {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(63, 95, 191, 0.22);
      flex-shrink: 0;
    }

    .icon svg {
      width: 21px;
      height: 21px;
      display: block;
    }

    .contact-text {
      min-width: 0;
    }

    .contact-value {
      font-size: clamp(15px, 3.4vw, 17px);
      line-height: 1.3;
      color: #1f2937;
      word-break: break-word;
      font-weight: 700;
    }

    .contact-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 3px;
      text-transform: lowercase;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 0;
      min-height: 54px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.015em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      padding: 0 22px;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }

    .btn.primary {
      width: min(100%, 280px);
      background: linear-gradient(160deg, #4f71d4 0%, #3f5fbf 55%, #27479f 100%);
      color: #ffffff;
      border: 0;
      box-shadow: 0 14px 28px rgba(63, 95, 191, 0.28);
    }

    .btn.primary:hover {
      background: linear-gradient(160deg, #5b7bdd 0%, #4b69c7 55%, #3150aa 100%);
      box-shadow: 0 16px 32px rgba(63, 95, 191, 0.32);
      transform: translateY(-1px);
    }

    .footer-brand {
      text-align: center;
      padding: 0 22px 22px;
      font-size: 13px;
      color: #7a8191;
    }

    .footer-brand a {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      body {
        padding: 12px 10px 20px;
      }

      .banner {
        height: 140px;
      }

      .logo-wrap {
        top: 10px;
        left: 10px;
        padding: 5px 8px;
        max-width: 100px;
      }

      .logo {
        height: 30px;
      }

      .profile-wrap {
        padding: 0 16px 16px;
      }

      .avatar-shell {
        width: 102px;
        height: 102px;
        margin-top: -52px;
      }

      .content {
        padding: 0 16px 18px;
      }

      .contact-item {
        grid-template-columns: 42px 1fr;
        gap: 12px;
        padding: 11px;
      }

      .icon {
        width: 42px;
        height: 42px;
      }

      .btn.primary {
        width: 100%;
      }

      .footer-brand {
        padding: 0 16px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="banner">
        <img id="bannerImg" class="banner-img" alt="Institution banner" src="Facade.JPG" />

        <div class="logo-wrap">
          <img id="logoImg" class="logo" alt="Institution logo" src="logo.PNG" />
        </div>

        <div class="banner-overlay"></div>
      </div>

      <div class="profile-wrap">
        <div class="avatar-shell">
          <img id="photo" class="photo" alt="Profile photo" src="Calpito, Jomar.JPG" />
        </div>

        <div class="identity">
          <h1 id="name" class="name">Jomar L. Calpito</h1>
          <p id="title" class="title">Acting Registrar/ Planning Officer</p>
          <p id="org" class="org">Southern Isabela College of Arts and Trades</p>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="contacts">
        <a id="mobileLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm5 18a1.25 1.25 0 1 0 0-2.5A1.25 1.25 0 0 0 12 20Zm-4-4h8V5H8v11Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="mobileText" class="contact-value">+63 907 071 1172</div>
            <div class="contact-label">mobile</div>
          </span>
        </a>

        <a id="workEmailLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.2-.25 6.2 5.06a1 1 0 0 0 1.26 0l6.14-5.06H5.2Zm13.8 1.77-5.07 4.18a3 3 0 0 1-3.86 0L5 8.27v8.98c0 .41.34.75.75.75h12.5c.41 0 .75-.34.75-.75V8.27Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="workEmailText" class="contact-value">jlcalpito@tesda.gov.ph</div>
            <div class="contact-label">work</div>
          </span>
        </a>

        <a id="personalEmailLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.2-.25 6.2 5.06a1 1 0 0 0 1.26 0l6.14-5.06H5.2Zm13.8 1.77-5.07 4.18a3 3 0 0 1-3.86 0L5 8.27v8.98c0 .41.34.75.75.75h12.5c.41 0 .75-.34.75-.75V8.27Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="personalEmailText" class="contact-value">jomar.l.calpito007@gmail.com</div>
            <div class="contact-label">personal</div>
          </span>
        </a>

        <a id="socialLink" class="contact-item" href="#" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 21v-7h2.35l.4-3h-2.75V9.09c0-.87.24-1.46 1.5-1.46H16.4V4.96c-.24-.03-1.05-.1-2-.1-1.98 0-3.33 1.21-3.33 3.43V11H8.8v3h2.27v7h2.43Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="socialText" class="contact-value">Jomar Calpito</div>
            <div class="contact-label">facebook</div>
          </span>
        </a>
      </div>

      <div class="actions">
        <button id="saveContactBtn" class="btn primary" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M17 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-2-4Zm-5 16a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm3-8H9V5h6v6Z"/>
          </svg>
          <span>Save Contact</span>
        </button>
      </div>
    </section>

    <div class="footer-brand">
      Powered by <a id="makerLink" href="https://www.facebook.com/zaiakursed.hprince" target="_blank" rel="noopener noreferrer">TapConnect.ph</a>
    </div>
  </main>

  <script>
    const profile = {
      name: 'Jomar L. Calpito',
      title: 'Acting Registrar/ Planning Officer',
      organization: 'Southern Isabela College of Arts and Trades',
      photo: 'Calpito, Jomar.JPG',
      banner: 'Facade.JPG',
      logo: 'logo.PNG',
      mobileRaw: '+639070711172',
      mobileDisplay: '+63 907 071 1172',
      workEmail: 'jlcalpito@tesda.gov.ph',
      personalEmail: 'jomar.l.calpito007@gmail.com',
      socialLabel: 'Jomar Calpito',
      socialUrl: 'https://www.facebook.com/zaiakursed.hprince',
      makerBrand: 'TapConnect.ph',
      makerUrl: 'https://www.facebook.com/zaiakursed.hprince'
    };

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value || '';
    }

    function setHref(id, value) {
      const el = document.getElementById(id);
      if (el) el.href = value || '#';
    }

    function esc(value = '') {
      return String(value)
        .replace(/\\/g, '\\\\')
        .replace(/\n/g, '\\n')
        .replace(/,/g, '\\,')
        .replace(/;/g, '\\;');
    }

    function normalizePhone(value = '') {
      return String(value).replace(/[^\d+]/g, '');
    }

    function setImage(id, src, alt) {
      const img = document.getElementById(id);
      if (!img) return;

      img.alt = alt || '';
      if (src) {
        img.src = src;
      }

      img.addEventListener('error', () => {
        img.style.display = 'none';
      }, { once: true });
    }

    function applyProfile(data) {
      setText('name', data.name);
      setText('title', data.title);
      setText('org', data.organization);
      setText('mobileText', data.mobileDisplay);
      setText('workEmailText', data.workEmail);
      setText('personalEmailText', data.personalEmail);
      setText('socialText', data.socialLabel);
      setText('makerLink', data.makerBrand);

      setHref('mobileLink', `tel:${normalizePhone(data.mobileRaw)}`);
      setHref('workEmailLink', `mailto:${data.workEmail}`);
      setHref('personalEmailLink', `mailto:${data.personalEmail}`);
      setHref('socialLink', data.socialUrl);
      setHref('makerLink', data.makerUrl);

      setImage('photo', data.photo, `${data.name} profile photo`);
      setImage('bannerImg', data.banner, `${data.organization} banner`);
      setImage('logoImg', data.logo, `${data.organization} logo`);

      document.title = `${data.name} | Contact Card`;
    }

    function downloadVCard(data) {
      const vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `FN:${esc(data.name)}`,
        `N:${esc(data.name)};;;;`,
        `ORG:${esc(data.organization)}`,
        `TITLE:${esc(data.title)}`,
        `TEL;TYPE=CELL:${esc(normalizePhone(data.mobileRaw))}`,
        `EMAIL;TYPE=WORK:${esc(data.workEmail)}`,
        `EMAIL;TYPE=HOME:${esc(data.personalEmail)}`,
        data.socialUrl ? `URL:${esc(data.socialUrl)}` : '',
        'END:VCARD'
      ].filter(Boolean).join('\r\n');

      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${data.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase()}.vcf`;
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
    }

    document.getElementById('saveContactBtn').addEventListener('click', () => {
      downloadVCard(profile);
    });

    applyProfile(profile);
  </script>
</body>
</html>
