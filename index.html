<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFC Profile Card</title>
  <style>
    :root {
      --primary: #3f5fbf;
      --primary-dark: #27479f;
      --bg: #eef2f7;
      --text: #0f172a;
      --muted: #5b6473;
      --card: #ffffff;
      --line: #1e293b;
      --soft: #f3f5f8;
      --shadow: 0 10px 28px rgba(35, 58, 125, 0.16);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f5f7fb 0%, #edf1f7 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .photo-wrap {
      position: relative;
      background: #dde5f3;
    }

    .photo {
      width: 100%;
      aspect-ratio: 1.05 / 1;
      object-fit: cover;
      display: block;
      background: #dbe2f0;
    }

    .wave {
      display: block;
      width: 100%;
      height: auto;
      margin-top: -2px;
    }

    .content {
      padding: 10px 24px 18px;
    }

    .identity {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 16px;
      align-items: start;
      margin-top: 4px;
      margin-bottom: 22px;
    }

    .identity-line {
      width: 1px;
      background: repeating-linear-gradient(
        to bottom,
        var(--line) 0 4px,
        transparent 4px 7px
      );
      min-height: 102px;
      justify-self: center;
      margin-top: 2px;
      opacity: 0.8;
    }

    .name {
      margin: 0 0 8px;
      font-size: clamp(24px, 5vw, 31px);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(17px, 3.8vw, 21px);
      line-height: 1.25;
      color: #0b1a33;
      font-weight: 500;
    }

    .org {
      margin: 0;
      font-size: clamp(15px, 3.4vw, 18px);
      line-height: 1.4;
      color: #27344b;
      font-style: italic;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }

    .contact-item {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 14px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border-radius: 14px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(63, 95, 191, 0.24);
    }

    .icon svg {
      width: 21px;
      height: 21px;
      display: block;
    }

    .contact-text {
      min-width: 0;
    }

    .contact-value {
      font-size: clamp(15px, 3.4vw, 18px);
      line-height: 1.25;
      color: #1f2937;
      word-break: break-word;
    }

    .contact-label {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: lowercase;
    }

    .actions {
      margin-top: 18px;
      background: var(--soft);
      border-radius: 14px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .btn {
      appearance: none;
      border: 0;
      width: 100%;
      min-height: 52px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
      padding: 0 18px;
    }

    .btn:hover { background: var(--primary-dark); }
    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: #ffffff;
      color: var(--primary);
      border: 2px solid rgba(63, 95, 191, 0.16);
      box-shadow: inset 0 0 0 1px rgba(63, 95, 191, 0.04);
    }

    .btn.secondary:hover {
      background: #f8faff;
    }

    .footer-brand {
      text-align: center;
      padding: 2px 24px 20px;
      font-size: 13px;
      color: #7a8191;
    }

    .footer-brand a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 420px) {
      .content { padding-inline: 18px; }
      .actions { padding: 14px; }
      .contact-item { grid-template-columns: 40px 1fr; gap: 12px; }
      .icon { width: 40px; height: 40px; }
      .identity { gap: 14px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="photo-wrap">
      <img id="photo" class="photo" alt="Profile photo" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1000&q=80" />
      <svg class="wave" viewBox="0 0 1440 260" preserveAspectRatio="none" aria-hidden="true">
        <path fill="#3f5fbf" d="M0,128L48,154.7C96,181,192,235,288,240C384,245,480,203,576,160C672,117,768,75,864,64C960,53,1056,75,1152,90.7C1248,107,1344,117,1392,122.7L1440,128L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"></path>
        <path fill="#ffffff" d="M0,180L48,202.7C96,225,192,271,288,276C384,281,480,245,576,202C672,159,768,107,864,90C960,73,1056,91,1152,106.7C1248,123,1344,139,1392,146.7L1440,154L1440,260L1392,260C1344,260,1248,260,1152,260C1056,260,960,260,864,260C768,260,672,260,576,260C480,260,384,260,288,260C192,260,96,260,48,260L0,260Z"></path>
      </svg>
    </section>

    <section class="content">
      <div class="identity">
        <div class="identity-line"></div>
        <div>
          <h1 id="name" class="name">Marichile I. Simon</h1>
          <p id="title" class="title">Quality Management Focal Person</p>
          <p id="org" class="org">TESDA-SICAT</p>
        </div>
      </div>

      <div class="contacts">
        <a id="mobileLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm5 18a1.25 1.25 0 1 0 0-2.5A1.25 1.25 0 0 0 12 20Zm-4-4h8V5H8v11Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="mobileText" class="contact-value">+63 948 282 9698</div>
            <div class="contact-label">mobile</div>
          </span>
        </a>

        <a id="workEmailLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.2-.25 6.2 5.06a1 1 0 0 0 1.26 0l6.14-5.06H5.2Zm13.8 1.77-5.07 4.18a3 3 0 0 1-3.86 0L5 8.27v8.98c0 .41.34.75.75.75h12.5c.41 0 .75-.34.75-.75V8.27Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="workEmailText" class="contact-value">misimon@tesda.gov.ph</div>
            <div class="contact-label">work</div>
          </span>
        </a>

        <a id="personalEmailLink" class="contact-item" href="#">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6.75A2.75 2.75 0 0 1 5.75 4h12.5A2.75 2.75 0 0 1 21 6.75v10.5A2.75 2.75 0 0 1 18.25 20H5.75A2.75 2.75 0 0 1 3 17.25V6.75Zm2.2-.25 6.2 5.06a1 1 0 0 0 1.26 0l6.14-5.06H5.2Zm13.8 1.77-5.07 4.18a3 3 0 0 1-3.86 0L5 8.27v8.98c0 .41.34.75.75.75h12.5c.41 0 .75-.34.75-.75V8.27Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="personalEmailText" class="contact-value">simonmarichile@gmail.com</div>
            <div class="contact-label">personal</div>
          </span>
        </a>

        <a id="socialLink" class="contact-item" href="#" target="_blank" rel="noopener noreferrer">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 21v-7h2.35l.4-3h-2.75V9.09c0-.87.24-1.46 1.5-1.46H16.4V4.96c-.24-.03-1.05-.1-2-.1-1.98 0-3.33 1.21-3.33 3.43V11H8.8v3h2.27v7h2.43Z"/></svg>
          </span>
          <span class="contact-text">
            <div id="socialText" class="contact-value">Marichile Simon</div>
            <div class="contact-label">facebook</div>
          </span>
        </a>
      </div>

      <div class="actions">
       
        <button id="saveContactBtn" class="btn secondary" type="button">Save Contact</button>
      </div>
    </section>

    <div class="footer-brand">
      Powered by <a id="makerLink" href="https://example.com" target="_blank" rel="noopener noreferrer">Your Brand</a>
    </div>
  </main>

  <script>
    const profile = {
      name: 'Marichile I. Simon',
      title: 'Quality Management Focal Person',
      organization: 'TESDA-SICAT',
      photo: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1000&q=80',
      mobileRaw: '+639482829698',
      mobileDisplay: '+63 948 282 9698',
      workEmail: 'misimon@tesda.gov.ph',
      personalEmail: 'simonmarichile@gmail.com',
      socialLabel: 'Marichile Simon',
      socialUrl: 'https://facebook.com/',
      connectUrl: 'https://example.com',
      makerBrand: 'Your Brand',
      makerUrl: 'https://example.com'
    };

    function setText(id, value) {
      document.getElementById(id).textContent = value || '';
    }

    function setHref(id, value) {
      document.getElementById(id).href = value || '#';
    }

    function esc(value = '') {
      return String(value)
        .replace(/\\/g, '\\\\')
        .replace(/\n/g, '\\n')
        .replace(/,/g, '\\,')
        .replace(/;/g, '\\;');
    }

    function applyProfile(data) {
      setText('name', data.name);
      setText('title', data.title);
      setText('org', data.organization);
      setText('mobileText', data.mobileDisplay);
      setText('workEmailText', data.workEmail);
      setText('personalEmailText', data.personalEmail);
      setText('socialText', data.socialLabel);
      setText('makerLink', data.makerBrand);

      setHref('mobileLink', `tel:${data.mobileRaw}`);
      setHref('workEmailLink', `mailto:${data.workEmail}`);
      setHref('personalEmailLink', `mailto:${data.personalEmail}`);
      setHref('socialLink', data.socialUrl);
      setHref('connectBtn', data.connectUrl);
      setHref('makerLink', data.makerUrl);

      const photo = document.getElementById('photo');
      photo.src = data.photo;
      photo.alt = `${data.name} profile photo`;
    }

    function downloadVCard(data) {
      const vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        `FN:${esc(data.name)}`,
        `N:${esc(data.name)};;;;`,
        `ORG:${esc(data.organization)}`,
        `TITLE:${esc(data.title)}`,
        `TEL;TYPE=CELL:${esc(data.mobileRaw)}`,
        `EMAIL;TYPE=WORK:${esc(data.workEmail)}`,
        `EMAIL;TYPE=HOME:${esc(data.personalEmail)}`,
        data.socialUrl ? `URL:${esc(data.socialUrl)}` : '',
        'END:VCARD'
      ].filter(Boolean).join('\r\n');

      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `${data.name.replace(/[^a-z0-9]+/gi, '_').toLowerCase()}.vcf`;
      document.body.appendChild(link);
      link.click();
      URL.revokeObjectURL(link.href);
      link.remove();
    }

    document.getElementById('saveContactBtn').addEventListener('click', () => downloadVCard(profile));

    applyProfile(profile);
  </script>
</body>
</html>
